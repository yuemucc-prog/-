name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pyinstaller-build-requirements.txt

      - name: Build one-file exe
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm BossLoopTimer.spec

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          iscc BossLoopTimer.iss

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossLoopTimer-exe
          path: dist/BossLoopTimer.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossLoopTimer-installer
          path: dist-installer/BossLoopTimer-Setup.exe
          if-no-files-found: error
